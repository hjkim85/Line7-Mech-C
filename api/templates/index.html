<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7호선 C조 업무포털</title>
    <link rel="manifest" href="/manifest.json?v=3">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="icon" type="image/png" href="/icon.png">
    <meta name="theme-color" content="#1E3A8A">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative">
        <header class="bg-blue-900 text-white p-4 flex items-center justify-center shadow-md sticky top-0 z-10">
            <img src="/icon.png" alt="logo" class="w-8 h-8 mr-3 rounded-md object-cover bg-white">
            <h1 class="text-xl font-bold tracking-wider">Line7-Mech-C</h1>
        </header>
        
        <main class="p-5">
            <div class="flex justify-between items-center mb-4 border-b-2 border-blue-900 pb-2">
                <h2 class="text-lg font-extrabold text-gray-800 flex items-center">
                    <span class="mr-2">📅</span> C조 업무 일정
                </h2>
                <button onclick="loadSchedules()" class="text-sm bg-gray-200 text-gray-700 px-3 py-1 rounded hover:bg-gray-300 transition">
                    새로고침 ↻
                </button>
            </div>
            
            <div id="schedule-list" class="space-y-4 pb-20">
                <div class="text-center text-gray-500 py-12 animate-pulse font-medium">
                    DB에서 일정을 불러오는 중입니다... 🚀
                </div>
            </div>
        </main>
    </div>

    <script>
        async function loadSchedules() {
            const listContainer = document.getElementById('schedule-list');
            listContainer.innerHTML = '<div class="text-center text-blue-600 py-12 animate-pulse font-medium">데이터 갱신 중... 🔄</div>';
            
            try {
                // 파이썬 백엔드(/api/data) 호출
                const response = await fetch('/api/data');
                const result = await response.json();
                
                if (result.status === 'success') {
                    const data = result.data;
                    
                    if (data.length === 0) {
                        listContainer.innerHTML = '<div class="text-center text-gray-500 py-12 bg-gray-50 rounded-lg border border-dashed border-gray-300">등록된 일정이 없습니다.</div>';
                        return;
                    }

                    // 화면 비우고 카드 그리기 시작
                    listContainer.innerHTML = ''; 
                    
                    data.forEach(item => {
                        // DB 데이터 추출 (값이 없으면 기본값 세팅)
                        const eventDate = item.event_date || '날짜 미정';
                        const title = item.title || '제목 없음';
                        const content = item.content || '내용이 없습니다.';
                        
                        // 카드 HTML 생성
                        const cardHtml = `
                            <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm hover:shadow-md transition">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="bg-blue-100 text-blue-800 text-xs px-2.5 py-1 rounded-md font-bold">${eventDate}</span>
                                </div>
                                <h3 class="font-bold text-gray-800 text-base mb-1.5">${title}</h3>
                                <p class="text-sm text-gray-600 line-clamp-3 leading-relaxed">${content}</p>
                            </div>
                        `;
                        listContainer.innerHTML += cardHtml;
                    });
                } else {
                    listContainer.innerHTML = `<div class="text-red-500 bg-red-50 p-4 rounded-lg font-medium text-sm">에러 발생: ${result.message}</div>`;
                }
            } catch (error) {
                listContainer.innerHTML = '<div class="text-red-500 bg-red-50 p-4 rounded-lg font-medium text-sm">서버와 통신할 수 없습니다.</div>';
            }
        }

        // 앱이 켜지자마자 데이터 로드 함수 실행
        window.onload = loadSchedules;
    </script>
</body>
</html>
