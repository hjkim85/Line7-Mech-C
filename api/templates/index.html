<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- ============================================================================== -->
    <!-- [대단원 1] HTML 기본 구조 및 CSS 스타일링                                       -->
    <!-- ============================================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Line7-Mech-C 업무포털</title>
    <link rel="manifest" href="/manifest.json?v=3">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="icon" type="image/png" href="/icon.png">
    <meta name="theme-color" content="#1E3A8A">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-btn { white-space: nowrap; padding: 12px 16px; font-weight: 700; color: #94a3b8; border-bottom: 3px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: #1e3a8a; border-bottom-color: #1e3a8a; }
        
        /* [수정 5] 캘린더 레이아웃 붕괴 방지: minmax(0, 1fr) 및 overflow: hidden 적용 */
        .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 2px; background: #e2e8f0; border: 1px solid #e2e8f0; }
        
        /* 모바일에서는 기본 80px 유지, PC(1024px 이상)에서는 최소 120px을 기본으로 하되 전체화면 높이에 맞춰(vh) 자동 확장 */
        .cal-cell { background: white; min-height: 80px; padding: 4px; display: flex; flex-direction: column; overflow: hidden; }
        @media (min-width: 1024px) {
            .cal-cell { min-height: max(120px, calc((100vh - 250px) / 6)); }
        }
        
        .cal-header { background: #f8fafc; text-align: center; font-weight: bold; font-size: 0.8rem; padding: 6px 0; }
        
        .whitespace-pre-wrap { white-space: pre-wrap; } 
        
        /* [수정 2] 읽기 전용(View Mode)일 때의 입력창 디자인 (회색 바탕 처리) */
        input:disabled, textarea:disabled, select:disabled {
            background-color: #f8fafc;
            color: #334155;
            cursor: not-allowed;
            border-color: #e2e8f0;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    
    <!-- ============================================================================== -->
    <!-- [대단원 2] 메인 레이아웃 및 네비게이션 영역                                     -->
    <!-- ============================================================================== -->
    <div class="w-full mx-auto bg-white min-h-screen shadow-lg relative pb-20">
        <header class="bg-blue-900 text-white p-3 sm:p-4 flex items-center justify-between shadow-md sticky top-0 z-20">
            <div class="flex items-center">
                <img src="/icon.png" class="w-8 h-8 mr-2 sm:mr-3 rounded-md object-cover bg-white">
                <h1 class="text-lg sm:text-xl font-bold tracking-wider">Line7-Mech-C</h1>
            </div>
            
            <div id="auth-section" class="flex items-center">
                <div id="google-login-btn"></div>
                
                <div id="user-profile" class="hidden flex items-center gap-2 sm:gap-3">
                    <div class="text-right">
                        <div id="user-name-display" class="text-xs sm:text-sm font-bold leading-tight"></div>
                        <div id="user-email-display" class="text-[0.65rem] text-blue-300 hidden sm:block"></div>
                    </div>
                    <button onclick="handleSignOut()" class="bg-blue-800 hover:bg-red-600 transition px-2 sm:px-3 py-1 rounded text-xs border border-blue-700 shadow-sm">로그아웃</button>
                </div>
            </div>
        </header>

        <nav class="flex overflow-x-auto hide-scroll bg-white border-b sticky top-[64px] z-10" id="tabs">
            <button onclick="switchTab(0)" class="tab-btn active">📢 중요알림</button>
            <button onclick="switchTab(1)" class="tab-btn">📅 캘린더</button>
            <button onclick="switchTab(2)" class="tab-btn">📋 업무목록</button>
            <button onclick="switchTab(3)" class="tab-btn">🚨 이벤트</button>
            <button onclick="switchTab(4)" class="tab-btn">✅ 종결이벤트</button>
            <button onclick="switchTab(5)" class="tab-btn">📁 자료실</button>
            <button onclick="switchTab(6)" class="tab-btn">📝 보고서</button>
            <button onclick="switchTab(7)" class="tab-btn">🖼️ 앨범</button>
        </nav>

        <main class="p-4" id="main-content">
            <div class="text-center py-20 text-gray-400 font-bold">데이터 로딩 중... 🚀</div>
        </main>

        <button id="globalAddBtn" onclick="openModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-xl text-3xl flex items-center justify-center hover:bg-blue-700 z-30 transition transform hover:scale-105">
            +
        </button>

        <!-- ============================================================================== -->
        <!-- [대단원 3] 통합 팝업(모달) UI                                                   -->
        <!-- ============================================================================== -->
        <div id="actionModal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-40 flex items-end justify-center sm:items-center">
            <div class="bg-white w-full max-w-md sm:rounded-xl rounded-t-2xl p-5 transform transition-all pb-8 shadow-2xl max-h-[90vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="text-lg font-bold text-gray-800" id="modalTitle">등록/수정</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 text-2xl font-bold">&times;</button>
                </div>
                
                <div id="modalBody" class="space-y-3"></div>
                
                <!-- [수정 2] 모달창 하단 버튼이 상황(보기/수정/등록)에 따라 동적으로 변하는 공간 -->
                <div id="modalButtons"></div>
            </div>
        </div>
    </div>

    <!-- ============================================================================== -->
    <!-- [대단원 4] 자바스크립트: 데이터베이스 통신 및 상태 관리 로직                   -->
    <!-- ============================================================================== -->
    <script>
        // 🚨 (채팅창 렌더링 오류 대비용 주석) 이곳이 [대단원 4]의 시작 부분입니다!

        let db = { notices: [], tasks: [], events: [], comments: [] };
        let currentTab = 0;
        let calYear = new Date().getFullYear();
        let calMonth = new Date().getMonth() + 1;
        
        // [수정] 기존 고정 이메일(DEFAULT_EMAIL)을 삭제하고 실제 로그인 정보를 담을 변수로 교체합니다.
        let userEmail = null;
        let userName = null;
        let editMode = null; 

        // [신규 추가] 구글 로그인 성공 시 백엔드로 토큰을 보내 검증하고 세션을 생성하는 함수
        async function handleCredentialResponse(response) {
            try {
                const res = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    userEmail = data.user.email;
                    userName = data.user.name;
                    
                    // 상단 헤더 UI 업데이트 (로그인 버튼 숨김, 프로필 표시)
                    document.getElementById('google-login-btn').style.display = 'none';
                    const profile = document.getElementById('user-profile');
                    profile.classList.remove('hidden');
                    profile.classList.add('flex');
                    document.getElementById('user-name-display').innerText = userName;
                    document.getElementById('user-email-display').innerText = userEmail;
                    
                    // ✅ 로그인이 성공했을 때 비로소 전체 데이터를 불러옵니다.
                    initApp(); 
                } else {
                    alert("구글 인증에 실패했습니다.");
                }
            } catch (error) {
                console.error("로그인 검증 에러:", error);
            }
        }

        // [신규 추가] 로그아웃 처리 함수
        function handleSignOut() {
            userEmail = null;
            userName = null;
            
            // 상단 헤더 UI 원복
            document.getElementById('user-profile').classList.add('hidden');
            document.getElementById('user-profile').classList.remove('flex');
            document.getElementById('google-login-btn').style.display = 'block';
            
            // 로그아웃 시 화면 데이터를 비우고 렌더링 초기화
            db = { notices: [], tasks: [], events: [], comments: [] };
            renderTab();
        }

        function formatDate(dateString) {
            if(!dateString) return '';
            const d = new Date(dateString);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        async function initApp() {
            try {
                const [nRes, tRes, eRes, cRes] = await Promise.all([
                    fetch('/api/notices').then(r => r.json()),
                    fetch('/api/tasks').then(r => r.json()),
                    fetch('/api/events').then(r => r.json()),
                    fetch('/api/event_comments').then(r => r.json())
                ]);
                db.notices = nRes.data || [];
                db.tasks = (tRes.data || []).sort((a, b) => new Date(a.start_date.split('~')[0]) - new Date(b.start_date.split('~')[0]));
                db.events = eRes.data || [];
                db.comments = cRes.data || [];
                renderTab(); 
            } catch (e) { console.error("데이터 통신 오류", e); }
        }

        function getShift(year, month, day) {
            const baseDate = new Date(2026, 5, 1);
            const targetDate = new Date(year, month - 1, day);
            const diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
            const cycle = ['A/D', 'A/C', 'B/A', 'B/D', 'C/B', 'C/A', 'D/C', 'D/B'];
            return cycle[((diffDays + 3) % 8 + 8) % 8];
        }

        // [신규 추가] 화면이 켜지면 구글 로그인 버튼을 렌더링합니다.
        window.onload = function() {
            google.accounts.id.initialize({
                // ⚠️ 주의: 아래 쌍따옴표 안쪽 문자열에 1단계에서 발급받으신 클라이언트 ID를 꼭 붙여넣어 주세요!
                client_id: "809024272690-0ebueeohb9sv0sdoe69v69fd0ooaap3p.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("google-login-btn"),
                { theme: "outline", size: "medium", type: "standard" }
            );
            
            // 기존에는 페이지가 로드되자마자 initApp()을 실행했지만,
            // 이제는 로그인 성공 전까지 빈 화면(데이터 없음)을 유지하기 위해 삭제했습니다.
        };

        // ==============================================================================
        // [대단원 5] 자바스크립트: 화면 UI 렌더링 및 클릭 이벤트 제어                   
        // ==============================================================================
        function switchTab(index) {
            currentTab = index;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.className = `tab-btn ${i === index ? 'active' : ''}`);
            document.getElementById('globalAddBtn').style.display = (currentTab === 0 || currentTab > 4) ? 'none' : 'flex';
            renderTab();
        }

        function toggleAccordion(id) {
            const detailDiv = document.getElementById(id);
            detailDiv.classList.toggle('hidden');
        }

        function renderTab() {
            const main = document.getElementById('main-content');
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`; 
            
            if (currentTab === 0) {
                html += `
                    <div class="col-span-full flex justify-between items-center mb-3 border-b pb-1">
                        <h2 class="font-bold text-blue-900 flex items-center"><span class="mr-2">📌</span> 자체 중요알림</h2>
                        <button onclick="openModal('notices')" class="bg-blue-100 text-blue-700 px-3 py-1 rounded text-sm font-bold hover:bg-blue-200">+ 새 알림 등록</button>
                    </div>
                `;
                
                db.notices.forEach(n => {
                    html += `
                        <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-500 shadow-sm col-span-full relative">
                            <p class="font-bold text-gray-800 whitespace-pre-wrap text-sm leading-relaxed">${n.content}</p>
                            <div class="mt-2 text-xs text-gray-500 flex justify-between items-end border-t border-blue-100 pt-2">
                                <span>작성: ${n.user_email.split('@')[0]} | ${formatDate(n.created_at)}</span>
                                <div class="flex gap-2">
                                    <button onclick="openModal('notices', ${n.id})" class="text-blue-500 hover:underline">수정</button>
                                    <button onclick="deleteItem('notices', ${n.id})" class="text-red-500 hover:underline">삭제</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `<h2 class="font-bold text-orange-600 mt-6 mb-3 border-b pb-1 col-span-full">⭐ 중요 표시된 현장 업무</h2>`;
                const starred = db.tasks.filter(t => t.is_starred && t.status !== '종료');
                if(starred.length === 0) html += `<div class="text-gray-400 text-sm col-span-full">중요 표시된 진행중 업무가 없습니다.</div>`;
                starred.forEach(t => { html += renderTaskCard(t); });
                
                main.innerHTML = `<div class="flex flex-col space-y-3 w-full col-span-full">` + html + `</div>`;
            } 
            else if (currentTab === 1) {
                const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
                const daysInMonth = new Date(calYear, calMonth, 0).getDate();
                const today = new Date();
                
                let calHtml = `
                    <div class="flex justify-between items-center mb-4 bg-white p-2 rounded-lg shadow-sm border col-span-full w-full mx-auto">
                        <button onclick="calMonth--; if(calMonth<1){calMonth=12; calYear--;} renderTab();" class="px-3 py-1 bg-gray-100 rounded hover:bg-gray-200">◀</button>
                        <h3 class="font-black text-lg">${calYear}년 ${calMonth}월</h3>
                        <button onclick="calMonth++; if(calMonth>12){calMonth=1; calYear++;} renderTab();" class="px-3 py-1 bg-gray-100 rounded hover:bg-gray-200">▶</button>
                    </div>
                    <div class="cal-grid rounded-xl overflow-hidden shadow-sm col-span-full w-full mx-auto">
                        <div class="cal-header text-red-500">일</div><div class="cal-header">월</div><div class="cal-header">화</div><div class="cal-header">수</div><div class="cal-header">목</div><div class="cal-header">금</div><div class="cal-header text-blue-500">토</div>
                `;
                
                for (let i = 0; i < firstDay; i++) calHtml += `<div class="cal-cell bg-gray-50"></div>`;
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${calYear}-${String(calMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const shift = getShift(calYear, calMonth, day);
                    const isToday = (day === today.getDate() && calMonth === today.getMonth()+1 && calYear === today.getFullYear());
                    const shiftColor = shift.includes('C') ? 'text-red-500' : 'text-gray-400';
                    const dayBadge = isToday ? `bg-blue-500 text-white rounded-full w-6 h-6 flex items-center justify-center` : ``;
                    
                    let dayHtml = `
                        <div class="cal-cell border-t border-r border-gray-100">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-bold ${dayBadge}">${day}</span>
                                <span class="text-[0.65rem] font-bold ${shiftColor}">${shift}</span>
                            </div>
                    `;
                    
                    db.tasks.filter(t => {
                        if (!t.start_date) return false;
                        if (t.date_type === '기간' && t.end_date) {
                            return dateStr >= t.start_date && dateStr <= t.end_date;
                        }
                        return t.start_date === dateStr;
                    }).forEach(t => {
                        const style = t.status === '종료' ? 'bg-gray-100 text-gray-400 line-through border-l-2 border-gray-300' : (t.is_starred ? 'bg-yellow-100 text-yellow-800 border-l-2 border-yellow-500 font-bold' : 'bg-blue-50 text-blue-800 border-l-2 border-blue-500');
                        // [수정 2] 캘린더 일정 클릭 시 보기 모드(isView = true)로 열리도록 연동
                        dayHtml += `<div onclick="openModal('tasks', ${t.id}, true)" class="text-[0.65rem] p-1 mb-1 rounded truncate shadow-sm cursor-pointer hover:opacity-80 ${style}">${t.title}</div>`;
                    });
                    calHtml += dayHtml + `</div>`;
                }
                main.innerHTML = calHtml + `</div>`;
            } 
            else if (currentTab === 2) {
                html += `<h2 class="font-bold text-blue-900 mb-3 border-b pb-1 col-span-full">📋 전체 업무 목록</h2>`;
                if(db.tasks.length === 0) html += `<div class="text-gray-400 text-sm text-center py-10 col-span-full">등록된 업무가 없습니다.</div>`;
                db.tasks.forEach(t => { html += renderTaskCard(t); });
                main.innerHTML = html + `</div>`;
            } 
            else if (currentTab === 3 || currentTab === 4) {
                const statusStr = currentTab === 3 ? "활성" : "종결";
                const icon = currentTab === 3 ? "🔴" : "🟢";
                const filtered = db.events.filter(e => (e.status || '활성') === statusStr);
                
                html += `<h2 class="font-bold text-blue-900 mb-3 border-b pb-1 col-span-full">${icon} ${statusStr} 이벤트 내역</h2>`;
                if(filtered.length === 0) { html += `<div class="text-gray-400 text-center py-10 w-full col-span-full">해당 이벤트가 없습니다.</div>`; } 
                else {
                    filtered.forEach(e => {
                        let cmtHtml = '';
                        db.comments.filter(c => c.event_id === e.id).forEach(c => {
                            cmtHtml += `
                                <div class="text-xs text-gray-600 bg-gray-50 p-2 rounded mb-1 border" id="cmt_view_${c.id}">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="font-bold text-blue-800">${c.user_email.split('@')[0]}</span>
                                        <div class="flex gap-2">
                                            <button onclick="toggleCommentEdit(${c.id})" class="text-gray-400 hover:text-blue-500">✏️</button>
                                            <button onclick="deleteItem('event_comments', ${c.id})" class="text-gray-400 hover:text-red-500">✖</button>
                                        </div>
                                    </div>
                                    <div class="whitespace-pre-wrap">${c.content}</div>
                                    <div class="text-[0.65rem] text-gray-400 mt-1">${formatDate(c.created_at)}</div>
                                </div>
                                <div id="cmt_edit_box_${c.id}" class="hidden bg-white p-2 border rounded mb-1 shadow-sm">
                                    <textarea id="cmt_edit_input_${c.id}" class="w-full border p-1 text-xs rounded outline-none focus:border-blue-500">${c.content}</textarea>
                                    <div class="flex justify-end gap-1 mt-1">
                                        <button onclick="toggleCommentEdit(${c.id})" class="px-2 py-1 bg-gray-200 text-xs rounded hover:bg-gray-300">취소</button>
                                        <button onclick="updateComment(${c.id})" class="px-2 py-1 bg-blue-500 text-white text-xs rounded hover:bg-blue-600">저장</button>
                                    </div>
                                </div>
                            `;
                        });

                        const btnAction = currentTab === 3 
                            ? `<button onclick="updateItem('events', ${e.id}, {status:'종결'})" class="w-full bg-green-500 text-white text-sm py-2 rounded font-bold mt-3 hover:bg-green-600 transition">이 이벤트 종결하기</button>` 
                            : `<button onclick="updateItem('events', ${e.id}, {status:'활성'})" class="w-full bg-gray-500 text-white text-sm py-2 rounded font-bold mt-3 hover:bg-gray-600 transition">활성 상태로 되돌리기</button>`;

                        html += `
                            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden mb-3">
                                <div class="p-4 cursor-pointer hover:bg-gray-50 flex justify-between items-center transition" onclick="toggleAccordion('event_detail_${e.id}')">
                                    <div class="font-bold text-gray-800 text-sm truncate">
                                        ${icon} <span class="text-blue-600 ml-1 mr-2">[${e.event_date || ''}]</span> ${e.title}
                                    </div>
                                    <span class="text-gray-400 text-xs ml-2">▼</span>
                                </div>
                                
                                <div id="event_detail_${e.id}" class="hidden p-4 border-t bg-gray-50">
                                    <div class="flex justify-between border-b pb-2 mb-2">
                                        <p class="text-xs text-gray-500">작성: ${e.user_email.split('@')[0]} | 등록: ${formatDate(e.created_at)}</p>
                                        <div class="flex gap-2">
                                            <button onclick="openModal('events', ${e.id})" class="text-xs text-blue-500 hover:underline">수정</button>
                                            <button onclick="deleteItem('events', ${e.id})" class="text-xs text-red-500 hover:underline">삭제</button>
                                        </div>
                                    </div>
                                    <p class="text-sm text-gray-800 my-3 whitespace-pre-wrap leading-relaxed border-l-2 border-gray-300 pl-2"><strong>초기 증상:</strong>\n${e.content}</p>
                                    
                                    <div class="my-3 p-3 bg-gray-100 border border-dashed border-gray-300 rounded text-center text-xs text-gray-500">
                                        📷 사진 첨부 (구글 드라이브 연동 후 활성화)
                                    </div>

                                    <div class="my-4 space-y-2 bg-white p-2 rounded border">${cmtHtml}</div>
                                    
                                    ${currentTab === 3 ? `
                                        <div class="flex gap-2 mt-2">
                                            <textarea id="cmt_new_${e.id}" placeholder="조치 내역 기록..." class="flex-1 border p-2 text-sm rounded outline-none h-10 focus:ring-2 focus:ring-blue-500"></textarea>
                                            <button onclick="addComment(${e.id})" class="bg-blue-600 text-white px-3 rounded text-sm font-bold hover:bg-blue-700">등록</button>
                                        </div>
                                    ` : ''}
                                    ${btnAction}
                                </div>
                            </div>
                        `;
                    });
                }
                main.innerHTML = html + `</div>`;
            } 
            // [신규 추가] 탭 5(자료실) 및 탭 7(앨범) 구글 드라이브 연동 로직
            else if (currentTab === 5 || currentTab === 7) {
                const isAlbum = currentTab === 7;
                const title = isAlbum ? "🖼️ 현장 사진 앨범" : "📁 도면 및 매뉴얼 자료실";
                
                // ⚠️ 주의: 구글 드라이브에서 직접 폴더를 열고 주소창의 폴더 고유 ID 문자열을 복사하여 아래에 각각 넣어주세요!
                const folderId = isAlbum ? "1ZUNDkpumQxfWcXe2UTzJsLYPyWe9_RUx" : "1HqUUBuMcsDH_tnZik5mDyvkJpll8MKtm";

                html += `<h2 class="font-bold text-blue-900 mb-3 border-b pb-1 col-span-full">${title}</h2>`;

                if (typeof userEmail === 'undefined' || !userEmail) {
                    html += `<div class="text-center py-20 text-gray-400 w-full col-span-full">구글 로그인이 필요한 메뉴입니다. 상단에서 로그인해주세요.</div>`;
                } else if (!window.driveToken) {
                    html += `
                        <div class="text-center py-10 col-span-full bg-white border rounded-xl shadow-sm">
                            <p class="mb-4 text-sm text-gray-600">안전한 데이터 열람을 위해 구글 드라이브 접근 권한이 필요합니다.</p>
                            <button onclick="requestDriveAccess()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-blue-700 transition">구글 드라이브 연결하기</button>
                        </div>
                    `;
                } else {
                    html += `<div id="drive-contents-${currentTab}" class="col-span-full text-center py-10 text-gray-500 font-bold">데이터를 불러오는 중입니다... 🚀</div>`;
                    fetchDriveFiles(folderId, currentTab); 
                }
                main.innerHTML = html + `</div>`;
            }
            else {
                main.innerHTML = `<div class="text-center py-20 text-gray-400 w-full col-span-full">아직 개발 대기 중인 메뉴입니다. (클라우드 연동 필요)</div>`;
            }
        }

        function renderTaskCard(t) {
            const isClosed = t.status === '종료';
            let displayDate = t.start_date || '';
            if (t.date_type === '기간' && t.end_date) {
                displayDate = `${t.start_date} ~ ${t.end_date}`;
            }
            return `
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm mb-3 overflow-hidden">
                    <div class="p-4 cursor-pointer hover:bg-gray-50 flex flex-col transition" onclick="toggleAccordion('task_detail_${t.id}')">
                        <div class="flex justify-between items-start mb-1">
                            <span class="bg-blue-100 text-blue-800 text-[0.7rem] px-2 py-0.5 rounded-md font-bold">[${t.category || '일반'}] ${t.date_type}: ${displayDate}</span>
                            <span class="text-gray-400 text-xs">▼</span>
                        </div>
                        <h3 class="font-bold text-base ${isClosed ? 'text-gray-400 line-through' : 'text-gray-800'}">${t.title}</h3>
                    </div>
                    
                    <div id="task_detail_${t.id}" class="hidden p-4 border-t bg-gray-50">
                        <div class="text-xs text-gray-500 mb-3 border-b pb-2">작성: ${t.user_email.split('@')[0]} | 등록: ${formatDate(t.created_at)}</div>
                        <p class="text-sm text-gray-700 mb-4 whitespace-pre-wrap leading-relaxed">${t.content || '내용 없음'}</p>
                        
                        <div class="flex gap-2 bg-white p-2 rounded-lg border">
                            <button onclick="updateItem('tasks', ${t.id}, {is_starred: ${!t.is_starred}})" class="flex-1 py-1 border rounded text-xs hover:bg-gray-100">${t.is_starred ? '⭐ 해제' : '☆ 중요'}</button>
                            <button onclick="openModal('tasks', ${t.id}, false)" class="flex-1 py-1 border rounded text-xs text-blue-600 hover:bg-blue-50">✏️ 수정</button>
                            ${!isClosed 
                                ? `<button onclick="updateItem('tasks', ${t.id}, {status: '종료'})" class="flex-1 py-1 border rounded text-xs text-green-600 font-bold hover:bg-green-50">✔️ 종료</button>` 
                                : `<button onclick="updateItem('tasks', ${t.id}, {status: '활성'})" class="flex-1 py-1 border rounded text-xs text-blue-600 font-bold hover:bg-blue-50">🔄 복구</button>`
                            }
                            <button onclick="deleteItem('tasks', ${t.id})" class="flex-1 py-1 border rounded text-xs text-red-500 hover:bg-red-50">🗑️ 삭제</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // [신규 추가] 구글 드라이브 권한 요청 함수 (OAuth 2.0 Token Client)
        function requestDriveAccess() {
            const client = google.accounts.oauth2.initTokenClient({
                // ⚠️ 주의: 대단원 4에 넣었던 것과 동일하게 구글 클라우드 콘솔의 클라이언트 ID를 아래에 넣어주세요!
                client_id: "809024272690-0ebueeohb9sv0sdoe69v69fd0ooaap3p.apps.googleusercontent.com",
                scope: 'https://www.googleapis.com/auth/drive.readonly',
                callback: (response) => {
                    if (response && response.access_token) {
                        window.driveToken = response.access_token;
                        renderTab(); // 권한 획득 후 화면을 다시 그리면 자동으로 폴더 내용 로딩이 시작됩니다.
                    }
                }
            });
            client.requestAccessToken();
        }

        // [신규 추가] 구글 드라이브 파일 목록 가져오기 및 UI 렌더링 함수
        async function fetchDriveFiles(folderId, tabIndex) {
            try {
                const res = await fetch('/api/drive/files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ access_token: window.driveToken, folder_id: folderId })
                });
                const data = await res.json();
                const container = document.getElementById(`drive-contents-${tabIndex}`);
                
                if (data.status === 'success') {
                    if (data.data.length === 0) {
                        container.innerHTML = `<div class="text-gray-400">해당 폴더에 파일이 없습니다.</div>`;
                        return;
                    }
                    
                    let fileHtml = `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 w-full">`;
                    data.data.forEach(f => {
                        const isImg = f.mimeType.includes('image');
                        const icon = isImg ? '🖼️' : '📄';
                        const thumb = f.thumbnailLink ? `<img src="${f.thumbnailLink}" class="w-full h-28 object-cover rounded mb-2 border">` : `<div class="w-full h-28 bg-gray-100 flex items-center justify-center rounded mb-2 text-4xl border">${icon}</div>`;
                        
                        fileHtml += `
                            <a href="${f.webViewLink}" target="_blank" class="border p-3 rounded-lg shadow-sm hover:shadow-md transition flex flex-col items-center bg-white cursor-pointer text-center hover:bg-gray-50">
                                ${thumb}
                                <span class="text-xs font-bold text-gray-700 truncate w-full" title="${f.name}">${f.name}</span>
                            </a>
                        `;
                    });
                    fileHtml += `</div>`;
                    container.innerHTML = fileHtml;
                    container.classList.remove('text-center', 'py-10');
                } else {
                    container.innerHTML = `<div class="text-red-500 font-bold">파일 로딩 실패: ${data.message}</div>`;
                }
            } catch (e) {
                document.getElementById(`drive-contents-${tabIndex}`).innerHTML = `<div class="text-red-500 font-bold">네트워크 오류가 발생했습니다.</div>`;
            }
        }

// 🚨 ==============================================================================
        // 🚨 [대단원 6] 자바스크립트: 모달 폼 동적 제어 및 데이터 제출                      
        // 🚨 ==============================================================================
        
        // [수정 3] 날짜 입력칸 숨김/표시 방식을 확실한 style.display 방식으로 변경
        function toggleDateInput() {
            const val = document.getElementById('m_dtype').value;
            const single = document.getElementById('date_single');
            const range = document.getElementById('date_range');
            
            if(single && range) {
                if(val === '기간') {
                    single.style.display = 'none';
                    range.style.display = 'flex';
                } else {
                    single.style.display = 'block';
                    range.style.display = 'none';
                }
            }
        }

        // [수정 2] 모달창 열기 (등록/수정/조회 통합) - isView 파라미터 추가
        function openModal(forceTable = null, editId = null, isView = false) {
            editMode = editId ? { table: forceTable, id: editId } : null;
            const table = forceTable || (currentTab === 0 ? 'notices' : (currentTab === 3 || currentTab === 4) ? 'events' : 'tasks');
            const body = document.getElementById('modalBody');
            
            let item = editId ? db[table].find(x => x.id === editId) : {};
            
            // 제목 분기
            if (isView) document.getElementById('modalTitle').innerText = "일정 상세보기";
            else document.getElementById('modalTitle').innerText = editId ? "내용 수정하기" : "새로 등록하기";

            // 비활성화(disabled) 텍스트 속성 추가
            const dis = isView ? "disabled" : "";

            // [수정 4] 텍스트 박스 높이를 h-[300px] 로 대폭 확장
            if (table === 'notices') {
                body.innerHTML = `<textarea id="m_content" ${dis} class="w-full border p-3 rounded-lg h-[300px] outline-none focus:ring-2 focus:ring-blue-500 whitespace-pre-wrap" placeholder="중요알림 내용">${item.content || ''}</textarea>`;
            } 
            else if (table === 'events') {
                body.innerHTML = `
                    <input type="date" id="m_date" ${dis} value="${item.event_date || ''}" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 mb-2">
                    <input type="text" id="m_title" ${dis} value="${item.title || ''}" placeholder="이벤트 제목" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 mb-2">
                    <textarea id="m_content" ${dis} class="w-full border p-3 rounded-lg h-[300px] outline-none focus:ring-2 focus:ring-blue-500 whitespace-pre-wrap" placeholder="초기 증상 및 현상을 자세히 적어주세요">${item.content || ''}</textarea>
                `;
            } 
            else if (table === 'tasks') {
                const isRange = item.date_type === '기간';
                const d1 = item.start_date || '';
                const d2 = item.end_date || '';
                
                body.innerHTML = `
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="m_title" ${dis} value="${item.title || ''}" placeholder="업무 제목" class="w-2/3 border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        <select id="m_cat" ${dis} class="w-1/3 border p-3 rounded-lg outline-none"><option value="일반">일반</option><option value="점검">점검</option><option value="자체">자체</option><option value="외주">외주</option><option value="제출">제출</option><option value="보고">보고</option></select>
                    </div>
                    <div class="flex gap-2 mb-2">
                        <select id="m_dtype" ${dis} onchange="toggleDateInput()" class="w-1/3 border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="특정날짜">특정날짜</option><option value="기간">기간</option><option value="기한">기한</option>
                        </select>
                        <div id="date_single" class="w-2/3" style="display: ${isRange ? 'none' : 'block'}">
                            <input type="date" id="m_date1" ${dis} value="${d1}" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div id="date_range" class="w-2/3 items-center gap-1" style="display: ${isRange ? 'flex' : 'none'}">
                            <input type="date" id="m_date_start" ${dis} value="${d1}" class="w-1/2 border p-2 rounded text-sm outline-none focus:ring-1 focus:ring-blue-500">
                            <span class="text-gray-400">~</span>
                            <input type="date" id="m_date_end" ${dis} value="${d2}" class="w-1/2 border p-2 rounded text-sm outline-none focus:ring-1 focus:ring-blue-500">
                        </div>
                    </div>
                    <textarea id="m_content" ${dis} class="w-full border p-3 rounded-lg h-[300px] outline-none focus:ring-2 focus:ring-blue-500 whitespace-pre-wrap" placeholder="상세 업무 내용">${item.content || ''}</textarea>
                `;
                
                if(item.category) document.getElementById('m_cat').value = item.category;
                if(item.date_type) { document.getElementById('m_dtype').value = item.date_type; }
                
                // 등록 창이 뜰 때 초기 날짜 형태 잡아주기
                if(!isView) toggleDateInput(); 
            }

            // [수정 2] 모달 하단 버튼을 보기 모드 여부에 따라 변경
            let buttonsHtml = '';
            if (isView) {
                buttonsHtml = `
                    <button id="btnEditMode" onclick="enableEditMode()" class="w-full bg-gray-500 text-white font-bold py-3 rounded-lg mt-4 shadow-md hover:bg-gray-600 transition">✏️ 수정하기</button>
                    <button id="btnSave" onclick="submitData()" class="hidden w-full bg-blue-600 text-white font-bold py-3 rounded-lg mt-4 shadow-md hover:bg-blue-700 transition">저장하기</button>
                `;
            } else {
                buttonsHtml = `<button id="btnSave" onclick="submitData()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mt-4 shadow-md hover:bg-blue-700 transition">저장하기</button>`;
            }
            document.getElementById('modalButtons').innerHTML = buttonsHtml;

            document.getElementById('actionModal').classList.remove('hidden');
        }

        // [수정 2] 캘린더에서 보기 모드로 열었을 때, 박스 잠금을 풀고 저장버튼을 띄우는 함수
        function enableEditMode() {
            document.querySelectorAll('#modalBody input, #modalBody textarea, #modalBody select').forEach(el => el.disabled = false);
            document.getElementById('modalTitle').innerText = "내용 수정하기";
            document.getElementById('btnEditMode').classList.add('hidden');
            document.getElementById('btnSave').classList.remove('hidden');
        }

        function closeModal() { 
            document.getElementById('actionModal').classList.add('hidden'); 
            editMode = null; 
        }

        async function submitData() {
            // [신규 추가] 로그인 확인 방어 로직
            if (!editMode && (!userEmail || userEmail === "")) {
                alert("구글 로그인이 필요합니다.");
                return;
            }

            const table = editMode ? editMode.table : (document.getElementById('m_cat') ? 'tasks' : document.getElementById('m_date') ? 'events' : 'notices');
            
            // [수정] DEFAULT_EMAIL(하드코딩) 대신, 로그인 세션에 저장된 실제 userEmail 변수를 사용하도록 변경
            let payload = editMode ? {} : { user_email: userEmail };

            if(table === 'notices') {
                payload.content = document.getElementById('m_content').value;
            } else if(table === 'events') {
                payload.event_date = document.getElementById('m_date').value;
                payload.title = document.getElementById('m_title').value;
                payload.content = document.getElementById('m_content').value;
            } else {
                payload.title = document.getElementById('m_title').value;
                payload.category = document.getElementById('m_cat').value;
                payload.date_type = document.getElementById('m_dtype').value;
                payload.content = document.getElementById('m_content').value;
                
                if(payload.date_type === '기간') {
                    payload.start_date = document.getElementById('m_date_start').value;
                    payload.end_date = document.getElementById('m_date_end').value;
                } else {
                    payload.start_date = document.getElementById('m_date1').value;
                    payload.end_date = null;
                }
            }

            try {
                if(editMode) {
                    await fetch(`/api/${table}/${editMode.id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                } else {
                    await fetch(`/api/${table}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                }
                closeModal(); 
                initApp(); 
            } catch(e) { alert("저장 실패했습니다."); }
        }
        
        // 🚨 ==============================================================================
        // 🚨 [대단원 7] 자바스크립트: 댓글 및 삭제/수정 공통 액션 로직                   
        // 🚨 ==============================================================================
        
        function toggleCommentEdit(id) {
            document.getElementById(`cmt_view_${id}`).classList.toggle('hidden');
            document.getElementById(`cmt_edit_box_${id}`).classList.toggle('hidden');
        }
        
        async function updateComment(id) {
            const val = document.getElementById(`cmt_edit_input_${id}`).value;
            await fetch(`/api/event_comments/${id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content: val}) });
            initApp();
        }
        
        async function addComment(eventId) {
            // [신규 추가] 로그인 확인 방어 로직
            if (!userEmail || userEmail === "") {
                alert("구글 로그인이 필요합니다.");
                return;
            }

            const val = document.getElementById(`cmt_new_${eventId}`).value;
            if(val) { 
                // [수정] DEFAULT_EMAIL을 실제 로그인 세션 변수인 userEmail로 교체
                await fetch('/api/event_comments', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({event_id: eventId, content: val, user_email: userEmail}) }); 
                initApp(); 
            }
        }

        async function updateItem(t, id, data) { 
            await fetch(`/api/${t}/${id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) }); 
            initApp(); 
        }
        
        async function deleteItem(t, id) { 
            if(confirm("정말 삭제하시겠습니까?")) { 
                await fetch(`/api/${t}/${id}`, { method: 'DELETE' }); 
                initApp(); 
            } 
        }
        
        window.onload = initApp;
    </script>
</body>
</html>
